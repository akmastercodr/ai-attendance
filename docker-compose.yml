version: '3.8'

services:
  app:
    build: .
    container_name: attendance-app
    restart: always
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: attendance-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
